<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register — Alchemy</title>
    <link th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-title">Create Account</div>

        <div th:if="${message != null}" class="alchemy-alert" style="border-radius:8px; margin-bottom:18px;" th:text="${message}"></div>

        <!--/*@thymesVar id="user" type="nbcc.auth.domain.UserRegistration"*/-->
        <form method="post" th:action="@{/register}" th:object="${user}">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input th:field="*{username}" class="form-control" placeholder="Choose a username"/>
                <div class="form-error" th:errors="*{username}"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input th:field="*{email}" class="form-control" placeholder="you@example.com"/>
                <div class="form-error" th:errors="*{email}"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input th:field="*{password}" type="password" class="form-control" placeholder="••••••••"/>
                <div class="form-error" th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn-auth-submit">Create Account</button>
        </form>

        <div class="auth-footer-link">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</div>

<footer>
    <div th:replace="~{partial :: footer}"></div>
</footer>

</body>
</html>
