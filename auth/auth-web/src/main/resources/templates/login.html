<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <title>Login — Alchemy</title>
</head>
<body>

<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-title">Sign In</div>

        <div th:if="${param.error}" class="alchemy-alert-danger" style="border-radius:8px; margin-bottom:18px;">
            Invalid username or password. Please try again.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="text" name="username" th:value="${param.username}"
                       class="form-control" placeholder="you@example.com" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="password-wrap">
                    <input type="password" name="password" id="loginPassword"
                           class="form-control" placeholder="••••••••" required/>
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)" tabindex="-1">
                        <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-auth-submit">Login</button>
        </form>

        <div class="auth-footer-link">
            Don't have an account? <a th:href="@{/register}">Sign up</a>
        </div>
    </div>
</div>

<footer>
    <div th:replace="~{partial :: footer}"></div>
</footer>

<script>
function togglePassword(inputId, btn) {
    var input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
        btn.classList.add('active');
    } else {
        input.type = 'password';
        btn.classList.remove('active');
    }
}
</script>

</body>
</html>
