<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dining Tables — Alchemy</title>
    <link th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="page-header">
    <h1>Dining Tables</h1>
    <div class="sub">Manage</div>
    <div class="gold-line"></div>
</div>

<div class="content-area">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px;">
        <span class="section-label">All Tables</span>
        <a th:href="@{/tables/create}" class="btn-alchemy-primary">+ Add Table</a>
    </div>

    <table class="alchemy-table">
        <thead>
            <tr>
                <th>Table Name</th>
                <th>Capacity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="table : ${tables}">
                <td th:text="${table.name}">Table 1</td>
                <td th:text="${table.capacity + ' guests'}">4 guests</td>
                <td>
                    <div class="btn-row" style="justify-content:flex-end;">
                        <a th:href="@{/tables/edit/{id}(id=${table.id})}" class="btn-alchemy-edit">Edit</a>
                        <a th:href="@{/tables/delete/{id}(id=${table.id})}" class="btn-alchemy-danger">Delete</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${tables == null or #lists.isEmpty(tables)}" class="empty-row">
                <td colspan="3">No dining tables yet. Add one to get started.</td>
            </tr>
        </tbody>
    </table>
</div>

<footer>
    <div th:replace="~{partial :: footer}"></div>
</footer>
</body>
</html>
